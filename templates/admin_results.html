<!DOCTYPE html>
<html>
<head>
    <title>Admin Results | Online Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header a {
            color: white;
            text-decoration: none;
            background: #e74c3c;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 14px;
        }

        .header a:hover {
            background: #c0392b;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #3498db;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #3498db;
        }

        .back:hover {
            text-decoration: underline;
        }

        .no-data {
            text-align: center;
            color: #777;
            font-size: 16px;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="header">
    <h3>Quiz Results</h3>
    <a href="/admin/dashboard">Back</a>
</div>

<div class="container">
    <h2>Student Quiz Results</h2>

    {% if data %}
    <table>
        <tr>
            <th>Student Name</th>
            <th>Score</th>
            <th>Total Questions</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
        <div class="no-data">No results available</div>
    {% endif %}

    <a class="back" href="/admin/dashboard">← Back to Dashboard</a>
</div>

</body>
</html>
