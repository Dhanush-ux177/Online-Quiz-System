<!DOCTYPE html>
<html>
<head>
    <title>Select Language</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            outline: none;
        }

        select:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Choose Quiz Language</h2>

        <form method="POST">
            <select name="language" required>
                <option value="">-- Select --</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="C">C</option>
            </select>

            <button type="submit">Start Quiz</button>
        </form>
    </div>

</body>
</html>
